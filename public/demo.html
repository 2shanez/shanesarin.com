<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }
        
        .header {
            padding: 20px 25px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .header h1 {
            color: #fff;
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .header p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
        }
        
        .chat-area {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .message.ai {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        
        .message.ai.typing::after {
            content: '●●●';
            animation: typing 1.5s infinite;
        }
        
        @keyframes typing {
            0%, 60% { opacity: 0.3; }
            30% { opacity: 1; }
        }
        
        .input-area {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            gap: 12px;
        }
        
        .input-area input {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: background 0.2s;
        }
        
        .input-area input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .input-area input:focus {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .input-area button {
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .input-area button:active {
            transform: translateY(0);
        }
        
        .features {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .feature {
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            text-align: center;
            transition: background 0.2s;
        }
        
        .feature:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .feature-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .feature h3 {
            color: #fff;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        
        .feature p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
        }

        .chat-area::-webkit-scrollbar {
            width: 6px;
        }
        
        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">🎩</div>
            <div>
                <h1>Alfred AI</h1>
                <p>Your intelligent assistant</p>
            </div>
        </div>
        
        <div class="chat-area" id="chatArea">
            <div class="message ai">
                Hello! I'm Alfred, your AI assistant. How can I help you today?
            </div>
        </div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
            <button onclick="sendMessage()">Send</button>
        </div>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">💬</div>
                <h3>Natural Chat</h3>
                <p>Conversational AI interface</p>
            </div>
            <div class="feature">
                <div class="feature-icon">📝</div>
                <h3>Note Integration</h3>
                <p>Works with your notes</p>
            </div>
            <div class="feature">
                <div class="feature-icon">🔍</div>
                <h3>Smart Search</h3>
                <p>Find anything instantly</p>
            </div>
            <div class="feature">
                <div class="feature-icon">⚡</div>
                <h3>Fast & Local</h3>
                <p>Privacy-first design</p>
            </div>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        
        const responses = [
            "That's a great question! Let me think about that...",
            "I can definitely help you with that. Here's what I suggest...",
            "Interesting! Based on your notes, I found some relevant information.",
            "I've analyzed the context and here's my recommendation...",
            "Let me search through your vault for that...",
            "Here's a summary of what I found in your notes.",
            "I can help you organize that. Would you like me to create a new note?",
            "Based on the patterns I see, here's what might work best..."
        ];
        
        function addMessage(text, isUser) {
            const msg = document.createElement('div');
            msg.className = `message ${isUser ? 'user' : 'ai'}`;
            msg.textContent = text;
            chatArea.appendChild(msg);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            
            addMessage(text, true);
            messageInput.value = '';
            
            // Show typing indicator
            const typing = document.createElement('div');
            typing.className = 'message ai typing';
            chatArea.appendChild(typing);
            chatArea.scrollTop = chatArea.scrollHeight;
            
            // Simulate AI response
            setTimeout(() => {
                typing.remove();
                const response = responses[Math.floor(Math.random() * responses.length)];
                addMessage(response, false);
            }, 1000 + Math.random() * 1000);
        }
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // Focus input on load
        messageInput.focus();
    </script>
</body>
</html>
